const SEGS = ["Prebuďte sa, vy ľudia, z oloveného spánku!", "Spoznajte to nedôstojné bremeno, ktoré nesiete,", "ktoré s nevýslovne húževnatým tlakom dolieha na milióny ľudí.", "Odhoďte ho!", "Stojí za to ho niesť?", "Ani jedinú sekundu!", "Čo skrýva?", "Prázdne plevy, ktoré sa pred dychom Pravdy placho rozletia.", "Čas a silu ste premárnili pre nič.", "Preto roztrhnite reťaze, ktoré vás držia dole,", "urobte sa konečne slobodnými!", "Človek, ktorý zostáva vnútorne spútaný,", "bude večne otrokom,", "aj keby bol kráľom.", "Viažete sa všetkým, čo sa snažíte naučiť.", "Porozmýšľajte:", "Učením sa vtláčate stále do cudzích foriem, ktoré vymysleli iní,", "ochotne sa pripájate k cudziemu presvedčeniu,", "osvojujete si len to, čo iní v sebe, pre seba prežili.", "Uvážte: Jedno nie je pre všetkých!", "Čo jednému osoží, môže druhému uškodiť.", "Každý jednotlivec má ísť svojou vlastnou cestou k zdokonaleniu.", "Jeho výzbrojou na to sú schopnosti, ktoré nesie v sebe.", "Podľa nich sa má riadiť, na nich stavať!", "Ak to nerobí, zostáva cudzincom sám v sebe,", "bude vždy stáť vedľa naučeného, ktoré sa v ňom nikdy nemôže stať živým.", "Každý zisk je preňho tým vylúčený.", "Živorí, pokrok je nemožný.", "Dávajte pozor, vy, ktorí vážne túžite po Svetle a Pravde:", "Cestu k Svetlu musí každý jednotlivec v sebe prežiť,", "musí ju sám objaviť, ak po nej chce kráčať isto.", "Len to, čo človek v sebe prežíva, so všetkými premenami cíti, to plne pochopil!", "Utrpenie a aj radosť ustavične klopú,", "aby povzbudzovali, vyburcovali k duchovnému prebudeniu.", "Na sekundy sa potom človek pritom veľmi často uvoľní od každej ničotnosti všedného života,", "a v šťastí ako v bolesti s tušením pociťuje spojenie s duchom, ktorý preniká všetkým živým.", "A všetko je predsa život, nič nie je mŕtve!", "Blaho tomu, kto také okamihy spojenia uchopí a udrží,", "a vznáša sa na nich nahor.", "Nesmie sa pritom držať strnulých foriem,", "ale každý sa má vyvíjať sám, zo svojho vnútra.", "Majte súcit s posmievačmi a so všetkými tými, ktorí sú duchovnému životu ešte odcudzení.", "Nehnevajte sa na nich, keď sa stávajú sarkastickými;", "lebo títo sú len na poľutovanie.", "Ako opití, ako chorí stoja pred veľkým dielom stvorenia, ktoré nám tak veľa ponúka.", "Ako slepí, ktorí sa tápajúc predierajú pozemským bytím a nevidia všetku tú nádheru okolo seba!", "Tí najbiednejší sú zmätení, spia;", "lebo ako môže napríklad človek ešte tvrdiť, že je len to, čo vidí?", "Že tam, kde svojimi očami nič nemôže zbadať, niet života?", "Že so smrťou svojho tela aj on sám prestáva byť,", "len preto, že sa doteraz vo svojej slepote okom nemohol presvedčiť o opaku?", "Či už teraz z mnohých vecí nevie, aká úzko ohraničená je schopnosť oka?", "Či ešte nevie, že súvisí so schopnosťou jeho mozgu, viazanou na priestor a čas?", "Že z tohto dôvodu všetko, čo sa povznáša nad priestor a čas, okom nemôže rozpoznať?", "Či sa ešte žiadnemu z týchto posmievačov nestalo jasným také logické rozumové zdôvodnenie?", "Duchovný život, nazvime ho aj onen svet, je predsa len čosi, čo stojí celkom nad pozemským rozdelením priestoru a času,", "ktorý teda potrebuje rovnorodú cestu, aby bol rozpoznaný.", "No naše oko nevidí ani to, čo sa dá rozdeliť do priestoru a času.", "Pomyslime na kvapku vody, o ktorej bezpodmienečnej čistote svedčí každé oko", "a ktorá, pozorovaná zostreným sklom, skrýva milióny živých tvorov,", "ktoré sa v nej nemilosrdne potierajú a ničia.", "Nie sú niekedy vo vode, vo vzduchu bacily, ktoré majú silu zničiť ľudské telo a ktoré nie sú okom rozpoznateľné?", "Stávajú sa však viditeľnými ostrými prístrojmi.", "Kto sa potom ešte odváži tvrdiť, že nevidíte nič nové, teraz ešte neznáme, akonáhle tieto prístroje viac zostríte?", "Zostrite ich tisícnásobne, miliónnásobne, videnie preto nenájde koniec,", "ale stále nové svety sa pred vami otvoria,", "ktoré ste predtým nemohli vidieť, ani pociťovať, no boli prítomné.", "Logické myslenie prináša rovnaké závery aj na všetko, čo vedy doteraz dokázali zhromaždiť.", "Dáva výhľad na trvalý ďalší vývoj, no nikdy na koniec.", "Čo je teda onen svet?", "Mnohí sa pri tom slove mýlia.", "Onen svet je jednoducho všetko to, čo sa nedá rozpoznať pozemskými pomôckami.", "Pozemské pomôcky sú však oči, mozog a všetko ostatné z tela,", "takisto prístroje, ktoré častiam pomáhajú vykonávať ich činnosť ešte ostrejšie a presnejšie, ďalej ju rozširovať.", "Dalo by sa teda povedať: onen svet je to, čo je za rozpoznávacou schopnosťou našich telesných očí.", "Oddelenie medzi týmto a oným svetom však neexistuje!", "Ani priepasť!", "Všetko je jednotné, ako celé stvorenie.", "Jedna sila preniká tento svet ako onen svet,", "všetko žije a pôsobí z tohto jedného prúdu života,", "a je tým celkom nerozlučne spojené.", "Z toho sa stáva zrozumiteľným nasledovné.", "Keď jedna jeho časť ochorie, musí sa účinok stať pociťovateľným v druhej časti, ako pri tele.", "Choré látky tejto druhej časti potom prúdia k chorej cez príťažlivosť rovnorodosti,", "čím chorobu ešte viac zosilňujú.", "Ak sa však taká choroba stane nevyliečiteľnou, vyplýva z toho nevyhnutné donútenie násilne odvrhnúť chorý úd, ak nemá celok trvalo trpieť.", "A nebezpečenstvo podmieňuje zdravé vzájomné pôsobenie, ktoré je nesprávnym postojom sťažené, niekedy nemysliteľné.", "Z tohto dôvodu sa preorientujte.", "Niet tohto a onoho sveta, ale len jednotné bytie!", "Pojem oddelenia vynašiel jedine človek,", "pretože nemôže všetko vidieť a nazdáva sa, že je stredobodom a hlavným bodom svojho viditeľného okolia.", "No jeho okruh pôsobenia je väčší.", "Omylom oddelenia sa však len obmedzuje, násilne, prekáža svojmu pokroku,", "a dáva priestor bezuzdnej fantázii, ktorá prináša obludné obrazy.", "Je potom prekvapujúce, ak v dôsledku toho mnohí majú len neveriaci úsmev, iní chorobné uctievanie, ktoré sa stáva otrockým alebo vyvrhne do fanatizmu?", "Kto sa tu ešte môže čudovať plachému strachu, ba úzkosti a hrôze, ktoré sa u niektorých vypestujú?", "Preč s tým všetkým!", "Načo to trýznenie?", "Zrúťte túto z const INFO = {"VERB": ["Sloveso", "verb"], "NOUN_M": ["Podstatné meno — mužský rod (der)", "noun"], "NOUN_F": ["Podstatné meno — ženský rod (die)", "noun"], "NOUN_N": ["Podstatné meno — stredný rod (das)", "noun"], "ADJ": ["Prídavné meno", "other"], "ADV": ["Príslovka", "other"], "PRON": ["Zámeno / určovateľ", "other"], "ART": ["Člen", "other"], "PREP": ["Predložka", "other"], "CONJ": ["Spojka", "other"], "PART": ["Častica", "other"], "NAME": ["Vlastné meno", "other"]};
const PRESETS=[
 {n:'Čierna',c:'#000000'},
 {n:'Modrá',c:'#1a56db'},
 {n:'Červená',c:'#c0392b'},

const LS='posolstvo_site_v2';
const def={mode:'desk',gran:'phrase',deC:'#000000',skC:'#000000',deB:true,deU:false,skB:false,skU:false};
let state=Object.assign({},def);
try{const s=JSON.parse(localStorage.getItem(LS));if(s)state=Object.assign(state,s);}catch(e){}
function save(){try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){}}

const $=s=>document.querySelector(s);
const content=$('#content'),menu=$('#menu');
const SEP='<span class="sep"> — </span>';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function runs(rs){return rs.map(r=>{if(r.br)return '<br>';let t=esc(r.t);
  if(r.id!==undefined)t='<span class="w" data-id="'+r.id+'">'+t+'</span>';
  if(r.i)t='<em>'+t+'</em>';
  if(r.s)t='<span class="sm">'+t+'</span>';
  return t;}).join('');}
function deS(p){return '<span class="de">'+runs(p.de)+'</span>';}
function skS(p){return '<span class="sk">'+runs(p.sk)+'</span>';}

function segList(pairs,mode){
  const o=[];
  if(mode==='de') pairs.forEach(p=>o.push(deS(p)));
  else if(mode==='sk') pairs.forEach(p=>o.push(skS(p)));
  else if(mode==='skde') pairs.forEach(p=>{o.push(skS(p));o.push(deS(p));});
  else pairs.forEach(p=>{o.push(deS(p));o.push(skS(p));});
  return o;
}
function joinSegs(segs,mode){return (mode==='de'||mode==='sk')?segs.join(' '):segs.join(SEP);}
function deText(p){return p.de.map(r=>r.t).join('');}
function endsSentence(p){return /[.!?]$/.test(deText(p).trim());}
function mergePairs(pairs){
  const de=[],sk=[];
  function app(arr,rs){
    if(arr.length){const prev=arr[arr.length-1].t,nxt=rs.length?rs[0].t:'';
      if(prev&&nxt&&!/\s$/.test(prev)&&!/^\s/.test(nxt))arr.push({t:' '});}
    rs.forEach(r=>arr.push(r));
  }
  pairs.forEach(p=>{app(de,p.de);app(sk,p.sk);});
  return {de,sk};
}
function groupBySentence(pairs){
  const groups=[];let cur=[];
  pairs.forEach(p=>{cur.push(p);if(endsSentence(p)){groups.push(cur);cur=[];}});
  if(cur.length)groups.push(cur);
  return groups.map(mergePairs);
}
function regroup(pairs,gran){
  if(gran==='paragraph')return [mergePairs(pairs)];
  if(gran==='sentence')return groupBySentence(pairs);
  return pairs;
}
function para(pairs,i,numbered,mode){
  const units=(mode==='de'||mode==='sk')?pairs:regroup(pairs,state.gran);
  const num=numbered?'<sup class="pnum">'+(i+1)+'</sup>':'';
  return '<p class="para">'+num+joinSegs(segList(units,mode),mode)+'</p>';
}
function motto(pairs,mode){
  const nl=s=>s.replace(/\n/g,'<br>');
  const de='<p class="motto-de">'+nl(pairs.map(p=>runs(p.de)).join(' '))+'</p>';
  const sk='<p class="motto-sk">'+nl(pairs.map(p=>runs(p.sk)).join(' '))+'</p>';
  let inner;
  if(mode==='de')inner=de; else if(mode==='sk')inner=sk;
  else if(mode==='skde')inner=sk+de; else inner=de+sk;
  return '<div class="mottobox">'+inner+'</div>';
}
function titleHTML(doc,mode){
  if(!doc.title) return '';
  const d='<div class="title tde">'+esc(doc.title.de)+'</div>';
  const s='<div class="title tsk">'+esc(doc.title.sk)+'</div>';
  if(mode==='de') return d;
  if(mode==='sk') return s;
  if(mode==='skde') return s+d;
  return d+s;
}
function sigHTML(doc,mode){
  if(!doc.signature) return '';
  const d='<span class="de">'+esc(doc.signature.de)+'</span>';
  const s='<span class="sk">'+esc(doc.signature.sk)+'</span>';
  let inner;
  if(mode==='de') inner=d; else if(mode==='sk') inner=s;
  else if(mode==='skde') inner=s+SEP+d; else inner=d+SEP+s;
  return '<p class="sig">'+inner+'</p>';
}
function renderContent(){
  let h=titleHTML(DOC,state.mode);
  DOC.paragraphs.forEach((pairs,i)=>{h+=(DOC.id==='motto')?motto(pairs,state.mode):para(pairs,i,DOC.numbered,state.mode);});
  h+=sigHTML(DOC,state.mode);
  content.innerHTML=h;
}
function applyVars(){
  const r=document.documentElement.style;
  r.setProperty('--de-c',state.deC);r.setProperty('--sk-c',state.skC);
  r.setProperty('--de-w',state.deB?'700':'400');r.setProperty('--sk-w',state.skB?'700':'400');
  r.setProperty('--de-d',state.deU?'underline':'none');r.setProperty('--sk-d',state.skU?'underline':'none');
}
function syncControls(){
  document.querySelectorAll('.modes button').forEach(b=>b.classList.toggle('on',b.dataset.mode===state.mode));
  document.querySelectorAll('.grans button').forEach(b=>b.classList.toggle('on',b.dataset.gran===state.gran));
  var grow=document.querySelector('.grow'); if(grow) grow.classList.toggle('off', state.mode==='de'||state.mode==='sk');
  document.querySelectorAll('.swatches').forEach(sw=>{
    const cur=(sw.dataset.lang==='de'?state.deC:state.skC).toLowerCase();
    sw.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on',x.dataset.c.toLowerCase()===cur));
  });
  const map={deB:state.deB,deU:state.deU,skB:state.skB,skU:state.skU};
  document.querySelectorAll('.tg').forEach(b=>b.classList.toggle('on',map[b.dataset.t]));
}
function buildSwatches(){
  document.querySelectorAll('.swatches').forEach(sw=>{

document.addEventListener('click',e=>{
  const m=e.target.closest('.modes button'); if(m){state.mode=m.dataset.mode;save();renderContent();syncControls();return;}
  const gr=e.target.closest('.grans button'); if(gr){state.gran=gr.dataset.gran;save();renderContent();syncControls();return;}
  const sw=e.target.closest('.sw'); if(sw){const lang=sw.closest('.swatches').dataset.lang; if(lang==='de')state.deC=sw.dataset.c; else state.skC=sw.dataset.c; save();applyVars();syncControls();return;}
  const tg=e.target.closest('.tg'); if(tg){const k=tg.dataset.t;state[k]=!state[k];save();applyVars();syncControls();return;}
});
/* ---- dropdown menus ---- */
function closeDrops(){document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('open'));document.querySelectorAll('.drop-btn').forEach(b=>b.classList.remove('on'));}
document.addEventListener('click',function(e){
  const t=e.target.closest('.drop-btn');
  if(t){const panel=document.getElementById(t.dataset.target),willOpen=!panel.classList.contains('open');
    closeDrops(); if(willOpen){panel.classList.add('open');t.classList.add('on');} return;}
  if(e.target.closest('.dropdown')) return;
  closeDrops();
});
/* ---- German word dictionary popup ---- */
function openMenu(w,x,y){
  closeDrops();
  const e=LEX[w.dataset.id]||{};
  const surface=w.textContent, lemma=e.l||surface, enc=encodeURIComponent(lemma);
  const inf=INFO[e.c]||['','other'], posLabel=inf[0], type=inf[1];
  const links=[];
  if(type==='verb')links.push(['Časovanie (Verbformen.de)','https://www.verbformen.de/?w='+enc]);
  links.push(['Význam (Glosbe DE→SK)','https://glosbe.com/de/sk/'+enc]);
  links.push(['Wiktionary (DE)','https://de.wiktionary.org/wiki/'+enc]);
  links.push(['DWDS','https://www.dwds.de/wb/'+enc]);
  const linksHtml=links.map(l=>'<a class="dlink" href="'+l[1]+'" target="_blank" rel="noopener">'+esc(l[0])+'</a>').join('');
  let tableHtml='';
  if(e.d){const t=e.d,c=v=>esc(v||'—');
    tableHtml='<table class="dtab"><tr><th></th><th>Jednotné</th><th>Množné</th></tr>'+
      '<tr><th>Nom.</th><td>'+c(t.nom_sg)+'</td><td>'+c(t.nom_pl)+'</td></tr>'+
      '<tr><th>Gen.</th><td>'+c(t.gen_sg)+'</td><td>'+c(t.gen_pl)+'</td></tr>'+
      '<tr><th>Dat.</th><td>'+c(t.dat_sg)+'</td><td>'+c(t.dat_pl)+'</td></tr>'+
      '<tr><th>Ak.</th><td>'+c(t.akk_sg)+'</td><td>'+c(t.akk_pl)+'</td></tr></table>';
  }else if(type==='verb'){tableHtml='<p class="dnote">Úplné časovanie otvoríš odkazom „Časovanie".</p>';}
  else if(type==='noun'){tableHtml='<p class="dnote">Skloňovanie nájdeš cez Wiktionary.</p>';}
  const lemmaLine=(e.l&&e.l!==surface)?' · základný tvar: <b>'+esc(e.l)+'</b>':'';
  const posLine=posLabel?'<p class="dpos"><b>'+esc(posLabel)+'</b>'+lemmaLine+'</p>':'';
  const sk=(e.s!==undefined)?SEGS[e.s]:'';
  const skLine=sk?'<p class="dsk"><b>Preklad úseku:</b> '+esc(sk)+'</p>':'';
  menu.innerHTML='<p class="mtitle">Slovník — „<span class="mword">'+esc(surface)+'</span>"</p>'+posLine+tableHtml+skLine+'<div class="dlinks">'+linksHtml+'</div><div class="mclose"><button id="menuClose">Zavrieť</button></div>';
  menu.hidden=false;
  const mw=menu.offsetWidth,mh=menu.offsetHeight;
  const vw=document.documentElement.clientWidth,vh=document.documentElement.clientHeight;
  let px=x,py=y+10; const maxX=window.scrollX+vw-mw-8;
  if(px>maxX)px=maxX; if(px<8)px=8;
  if(y+10+mh>window.scrollY+vh-8)py=y-mh-10; if(py<window.scrollY+8)py=window.scrollY+8;
  menu.style.left=px+'px'; menu.style.top=py+'px';
  document.getElementById('menuClose').onclick=closeMenu;
}
function closeMenu(){menu.hidden=true;}
content.addEventListener('click',e=>{const w=e.target.closest('.w'); if(w){e.stopPropagation(); openMenu(w,e.pageX,e.pageY);}});
document.addEventListener('click',e=>{if(!menu.hidden && !menu.contains(e.target)) closeMenu();});
/* ---- init ---- */
$('#doctitle').textContent = DOC.title ? (DOC.title.de+' · '+DOC.title.sk) : 'Motto';
buildSwatches();applyVars();renderContent();syncControls();


</script>
