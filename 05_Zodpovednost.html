const SEGS = ["Táto otázka je vždy jednou z prvých,", "keďže zďaleka najväčší počet ľudí priveľmi rád zvaľuje zo seba každú zodpovednosť", "a chcel by ju naložiť na čokoľvek iné než na seba samého.", "Že je to samo osebe znehodnotením seba,", "im pri tom nehrá nijakú úlohu.", "V tomto sú skutočne veľmi pokorní a skromní,", "ale len preto, aby mohli o to veselšie a bezohľadnejšie žiť bezstarostne ďalej.", "Veď by to bolo také krásne,", "splniť si všetky svoje želania", "a smieť si všetky svoje chúťky pokojne, neodčinene vybúriť aj voči iným ľuďom.", "Pozemské zákony sa dajú v núdzi ľahko obísť", "a zrážkam sa vyhnúť.", "Zručnejší dokonca môžu pod ich rúškom podnikať celkom úspešné úlovky", "a robiť všeličo,", "čo by neobstálo v nijakej bližšej skúške.", "Pritom dokonca ešte často užívajú povesť celkom mimoriadne schopných ľudí.", "Dalo by sa teda s istou chytrosťou vlastne celkom pohodlne žiť podľa vlastných názorov,", "keby... niekde niečo nebolo,", "čo by budilo nepríjemné cítenie,", "prejavoval sa občasný vzmáhajúci sa nepokoj nad tým,", "že všeličo predsa napokon môže byť niečím iným,", "než ako si to vlastné želanie formuje.", "A tak to aj je!", "Skutočnosť je vážna a neúprosná.", "Želania ľudí nemôžu v tomto ohľade privodiť nijakú odchýlku.", "Železne ostáva zákon v platnosti:", "„Čo človek zaseje, to bude mnohonásobne žať!“", "Týchto niekoľko slov skrýva a hovorí oveľa viac,", "než si pritom nejeden myslí.", "Na vlas a celkom presne zodpovedajú skutočnému deju v stvorení spočívajúceho vzájomného pôsobenia.", "Nemohol by sa preň nájsť výstižnejší výraz.", "Presne ako žatva vydáva mnohonásobok siatby,", "tak zasahuje človeka vždy rozmnožené znovu to,", "čo vo svojich vlastných cíteniach prebúdza a vysiela,", "podľa druhu svojej myšlienky.", "Človek teda duchovne nesie zodpovednosť za všetko,", "čo robí.", "Táto zodpovednosť sa začína už pri rozhodnutí,", "nie až pri vykonanom skutku,", "ktorý je predsa len následkom rozhodnutia.", "A rozhodnutie je prebudením vážneho chcenia!", "Niet oddelenia medzi týmto svetom a takzvaným záhrobím,", "ale všetko je len jediné veľké bytie.", "Celé mohutné, človeku viditeľné aj neviditeľné stvorenie do seba zapadá ako obdivuhodne dômyselné, nikdy nezlyhávajúce súkolie,", "nejde vedľa seba.", "Jednotné zákony nesú celok,", "ktoré podobne nervovým povrazcom všetko prenikajú, držia pohromade,", "a navzájom sa v ustavičnom vzájomnom pôsobení prejavujú!", "Keď školy a cirkvi pritom hovoria o nebi a pekle,", "o Bohu a diablovi,", "tak je to správne.", "Nesprávne je však vysvetlenie o dobrých a zlých silách.", "To musí každého vážne hľadajúceho ihneď uvrhnúť do omylov a pochybností;", "lebo kde sú dve sily,", "museli by logicky byť aj dvaja vládcovia, v tomto prípade teda dvaja bohovia,", "jeden dobrý a jeden zlý.", "A tak to nie je!", "Jestvuje len jeden Stvoriteľ, jeden Boh,", "a preto aj len jedna sila,", "ktorá všetko súce preteká, oživuje a podporuje!", "Táto čistá, tvorivá Božia sila ustavične preteká celým stvorením,", "spočíva v ňom,", "je od neho neoddeliteľná.", "Všade ju možno nájsť:", "vo vzduchu, v každej kvapke vody,", "v rastúcom kameni, v snažiacej sa rastline, v zvierati,", "a prirodzene aj v človeku.", "Niet ničoho, kde by nebola.", "A tak ako všetko preplavuje,", "tak preteká bez prestania aj človekom.", "Ten je teraz tak uspôsobený,", "že sa podobá šošovke.", "Ako šošovka zbiera slnečné lúče, ktoré ňou prechádzajú, a spojene ich vedie ďalej,", "takže hrejúce lúče, spájajúc sa na jednom bode, pália a zapaľujúc roznecujú oheň,", "tak zbiera človek svojou osobitou uspôsobenosťou tvorivú silu prúdiacu cez neho svojím cítením", "a vedie ju zozbieranú ďalej svojimi myšlienkami.", "Podľa druhu tohto cítenia a s ním súvisiacich myšlienok", "usmerňuje teda samočinne pôsobiacu tvorivú Božiu silu k dobrému alebo k zlému prejavu!", "A to je tá zodpovednosť, ktorú musí človek niesť!", "Vy, ktorí často tak kŕčovito hľadáte,", "ako nájsť pravú cestu,", "prečo si to tak sťažujete?", "Predstavte si v celej jednoduchosti obraz,", "ako čistá sila Stvoriteľa preteká cez vás", "a vy ju usmerňujete svojimi myšlienkami dobrým alebo zlým smerom.", "Tým máte bez námahy a bez lámania si hlavy všetko!", "Uvážte, že to závisí od vášho jednoduchého cítenia a myslenia,", "či táto mohutná sila teraz vyvolá dobro alebo zlo.", "Aká podporujúca alebo skazu prinášajúca moc je vám tým daná!", "Nemusíte sa pritom namáhať tak, že vám pot vystúpi na čelo,", "nemusíte sa kŕčovito upínať na takzvané okultné cvičenie,", "aby ste cez všetky možné a nemožné telesné a duchovné pokrivenia", "dosiahli akýsi pre váš pravdivý duchovný vzlet celkom bezvýznamný stupeň!", "Zanechajte túto časovo náročnú hračku,", "ktorá sa už tak často stala trýznivým mučením,", "ktorá neznamená nič iné než niekdajšie sebabičovania a sebatrýznenia v kláštoroch.", "Je to len iná forma toho istého,", "ktorá vám dokáže priniesť práve tak málo zisku.", "Takzvaní okultní majstri a žiaci sú moderní farizeji!", "V najpravdivejšom zmysle slova.", "Podávajú verný zrkadlový obraz farizejov z čias Ježiša z Nazareta.", "S čistou radosťou pamätajte na to,", "že bez námahy svojím jednoduchým, dobro chcejúcim cítením a myslením dokážete usmerňovať jedinú a mohutnú tvorivú silu.", "Presne podľa druhu vášho cítenia a vašich myšlienok sa potom sila prejaví.", "Ona pracuje sama,", "vy ju máte iba usmerňovať.", "A to sa deje v celej jednoduchosti a prostote!", "Netreba na to nijakú učenosť,", "ani len čítanie a písanie.", "Je to dané každému z vás v rovnakej miere!", "V tom niet rozdielu.", "Ako dieťa hravo dokáže vypínačom zapnúť elektrický prúd,", "ktorý vyvíja nesmierne účinky,", "tak je vám darované,", "usmerňovať svojimi jednoduchými myšlienkami Božskú silu.", "Môžete sa z toho tešiť,", "môžete na to byť hrdí,", "hneď ako to použijete na dobré!", "Ale chvejte sa, keď to neužitočne premárnite alebo dokonca použijete na nečisté!", "Lebo zákonom vzájomného pôsobenia spočívajúcim v stvorení nemôžete uniknúť.", "A keby ste mali krídla rannej zory,", "ruka Pána, ktorého silu tým zneužívate,", "by vás zasiahla skrze toto samočinne pracujúce vzájomné pôsobenie,", "kdekoľvek by ste sa chceli skryť.", "Zlo sa spôsobuje tou istou čistou, Božskou silou ako dobro!", "A tento každému voľne ponechaný spôsob použitia tejto jednotnej Božej sily v sebe skrýva zodpovednosť,", "ktorej nikto nedokáže uniknúť.", "Preto volám každému hľadajúcemu:", "„Udržuj ohnisko svojich myšlienok čisté,", "tým nastoľuješ mier a si šťastný!“", "Plesajte, vy nevediaci a slabí;", "lebo vám je daná tá istá moc ako silným!", "Nerobte si to teda príliš ťažkým!", "Nezabúdajte, že čistá samotvorivá Božia sila prúdi aj cez vás,", "a že aj vy ako ľudia ste schopní,", "dať tejto sile určitý smer druhom svojich vnútorných cítení,", "teda svojho chcenia,", "k dobru ako aj k zlu,", "pustošivo alebo budujúco,", "prinášajúc radosť alebo utrpenie!", "Keďže jestvuje len táto jedna Božia sila,", "objasňuje sa tým aj tajomstvo,", "prečo temno musí Svetlu, zlo dobru v každom vážnom konečnom boji ustúpiť.", "Ak usmerňujete Božiu silu k dobru,", "tak ostáva vo svojej pôvodnej čistote nezakalená", "a vyvíja tým oveľa silnejšiu silu,", "kým so zakalením do nečistého zároveň prebieha oslabenie.", "Tak bude v konečnom boji čistota sily vždy pôsobiť prierazne a bude rozhodujúca.", "Čo je dobré a čo zlé,", "to pociťuje každý až do končekov prstov, nevyslovene.", "Hútať o tom by len mätlo.", "Tupé hútanie je márnenie sily,", "ako močiar, lepkavé bahno,", "ktoré ochromujúco zviera a dusí všetko dosiahnuteľné.", "Svieža veselosť však roztrhne kliatbu hútania.", "Nemáte prečo byť smutní a skľúčení!", "Každý okamih môžete začať cestu do výšin", "a napraviť minulé, nech je to čokoľvek!", "Nerobte nič iné, len myslite na dej čistej Božej sily, ktorá vami ustavične preteká,", "potom aj sami cúvate pred tým,", "viesť túto čistotu do špinavých kanálov zlých myšlienok,", "pretože bez akejkoľvek námahy môžete rovnakým spôsobom dosiahnuť najvyššie a najušľachtilejšie.", "Veď máte len usmerňovať,", "sila potom pôsobí sama v smere, ktorý ste chceli.", "Máte tým šťastie alebo nešťastie vo vlastnej ruke.", "Zdvihnite preto hrdo hlavu a slobodne a smelo čelo.", "Zlo sa nemôže priblížiť, ak ho nezavoláte!", "Ako to chcete, tak sa vám stane!"];
const INFO = {"VERB": ["Sloveso", "verb"], "NOUN_M": ["Podstatné meno — mužský rod (der)", "noun"], "NOUN_F": ["Podstatné meno — ženský rod (die)", "noun"], "NOUN_N": ["Podstatné meno — stredný rod (das)", "noun"], "ADJ": ["Prídavné meno", "other"], "ADV": ["Príslovka", "other"], "PRON": ["Zámeno / určovateľ", "other"], "ART": ["Člen", "other"], "PREP": ["Predložka", "other"], "CONJ": ["Spojka", "other"], "PART": ["Častica", "other"], "NAME": ["Vlastné meno", "other"]};
const PRESETS=[
 {n:'Čierna',c:'#000000'},
 {n:'Modrá',c:'#1a56db'},
 {n:'Červená',c:'#c0392b'},
 {n:'Zelená',c:'#1e7e34'},
 {n:'Fialová',c:'#7a3ff2'},
 {n:'Hnedá',c:'#7a5230'}
];
const LS='posolstvo_site_v2';
const def={mode:'desk',gran:'phrase',deC:'#000000',skC:'#000000',deB:true,deU:false,skB:false,skU:false,nonum:false};
let state=Object.assign({},def);
try{const s=JSON.parse(localStorage.getItem(LS));if(s)state=Object.assign(state,s);}catch(e){}
function save(){try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){}}

const $=s=>document.querySelector(s);
const content=$('#content'),menu=$('#menu');
const SEP='<span class="sep"> — </span>';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function runs(rs){return rs.map(r=>{if(r.br)return '<br>';let t=esc(r.t);
  if(r.id!==undefined)t='<span class="w" data-id="'+r.id+'">'+t+'</span>';
  if(r.i)t='<em>'+t+'</em>';
  if(r.s)t='<span class="sm">'+t+'</span>';
  return t;}).join('');}
function deS(p){return '<span class="de">'+runs(p.de)+'</span>';}
function skS(p){return '<span class="sk">'+runs(p.sk)+'</span>';}

function segList(pairs,mode){
  const o=[];
  if(mode==='de') pairs.forEach(p=>o.push(deS(p)));
  else if(mode==='sk') pairs.forEach(p=>o.push(skS(p)));
  else if(mode==='skde') pairs.forEach(p=>{o.push(skS(p));o.push(deS(p));});
  else pairs.forEach(p=>{o.push(deS(p));o.push(skS(p));});
  return o;
}
function joinSegs(segs,mode){return (mode==='de'||mode==='sk')?segs.join(' '):segs.join(SEP);}
function deText(p){return p.de.map(r=>r.t).join('');}
function endsSentence(p){return /[.!?]$/.test(deText(p).trim());}
function mergePairs(pairs){
  const de=[],sk=[];
  function app(arr,rs){
    if(arr.length){const prev=arr[arr.length-1].t,nxt=rs.length?rs[0].t:'';
      if(prev&&nxt&&!/\s$/.test(prev)&&!/^\s/.test(nxt))arr.push({t:' '});}
    rs.forEach(r=>arr.push(r));
  }
  pairs.forEach(p=>{app(de,p.de);app(sk,p.sk);});
  return {de,sk};
}
function groupBySentence(pairs){
  const groups=[];let cur=[];
  pairs.forEach(p=>{cur.push(p);if(endsSentence(p)){groups.push(cur);cur=[];}});
  if(cur.length)groups.push(cur);
  return groups.map(mergePairs);
}
function regroup(pairs,gran){
  if(gran==='paragraph')return [mergePairs(pairs)];
  if(gran==='sentence')return groupBySentence(pairs);
  return pairs;
}
function para(pairs,i,numbered,mode){
  const units=(mode==='de'||mode==='sk')?pairs:regroup(pairs,state.gran);
  const num=numbered?'<sup class="pnum">'+(i+1)+'</sup>':'';
  return '<p class="para">'+num+joinSegs(segList(units,mode),mode)+'</p>';
}
function motto(pairs,mode){
  const nl=s=>s.replace(/\n/g,'<br>');
  const de='<p class="motto-de">'+nl(pairs.map(p=>runs(p.de)).join(' '))+'</p>';
  const sk='<p class="motto-sk">'+nl(pairs.map(p=>runs(p.sk)).join(' '))+'</p>';
  let inner;
  if(mode==='de')inner=de; else if(mode==='sk')inner=sk;
  else if(mode==='skde')inner=sk+de; else inner=de+sk;
  return '<div class="mottobox">'+inner+'</div>';
}
function titleHTML(doc,mode){
  if(!doc.title) return '';
  const d='<div class="title tde">'+esc(doc.title.de)+'</div>';
  const s='<div class="title tsk">'+esc(doc.title.sk)+'</div>';
  if(mode==='de') return d;
  if(mode==='sk') return s;
  if(mode==='skde') return s+d;
  return d+s;
}
function sigHTML(doc,mode){
  if(!doc.signature) return '';
  const d='<span class="de">'+esc(doc.signature.de)+'</span>';
  const s='<span class="sk">'+esc(doc.signature.sk)+'</span>';
  let inner;
  if(mode==='de') inner=d; else if(mode==='sk') inner=s;
  else if(mode==='skde') inner=s+SEP+d; else inner=d+SEP+s;
  return '<p class="sig">'+inner+'</p>';
}
function renderContent(){
  let h=titleHTML(DOC,state.mode);
  DOC.paragraphs.forEach((pairs,i)=>{h+=(DOC.id==='motto')?motto(pairs,state.mode):para(pairs,i,DOC.numbered,state.mode);});
  h+=sigHTML(DOC,state.mode);
  content.innerHTML=h;
}
function applyVars(){
  const r=document.documentElement.style;
  r.setProperty('--de-c',state.deC);r.setProperty('--sk-c',state.skC);
  r.setProperty('--de-w',state.deB?'700':'400');r.setProperty('--sk-w',state.skB?'700':'400');
  r.setProperty('--de-d',state.deU?'underline':'none');r.setProperty('--sk-d',state.skU?'underline':'none');
}
function applyNonum(){document.body.classList.toggle('nonum',!!state.nonum);}
function syncControls(){
  document.querySelectorAll('.modes button').forEach(b=>b.classList.toggle('on',b.dataset.mode===state.mode));
  document.querySelectorAll('.grans button').forEach(b=>b.classList.toggle('on',b.dataset.gran===state.gran));
  var grow=document.querySelector('.grow'); if(grow) grow.classList.toggle('off', state.mode==='de'||state.mode==='sk');
  document.querySelectorAll('.swatches').forEach(sw=>{
    const cur=(sw.dataset.lang==='de'?state.deC:state.skC).toLowerCase();
    sw.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on',x.dataset.c.toLowerCase()===cur));
  });
  const map={deB:state.deB,deU:state.deU,skB:state.skB,skU:state.skU};
  document.querySelectorAll('.tg').forEach(b=>b.classList.toggle('on',map[b.dataset.t]));
  var nt=document.querySelector('[data-numtoggle]'); if(nt) nt.classList.toggle('on',!state.nonum);
}
function buildSwatches(){
  document.querySelectorAll('.swatches').forEach(sw=>{
    sw.innerHTML=PRESETS.map(p=>'<button class="sw" data-c="'+p.c+'" title="'+p.n+'" style="background:'+p.c+'"></button>').join('');
  });
}
document.addEventListener('click',e=>{
  const nt=e.target.closest('[data-numtoggle]'); if(nt){state.nonum=!state.nonum;save();applyNonum();syncControls();return;}
  const m=e.target.closest('.modes button'); if(m){state.mode=m.dataset.mode;save();renderContent();syncControls();return;}
  const gr=e.target.closest('.grans button'); if(gr){state.gran=gr.dataset.gran;save();renderContent();syncControls();return;}
  const sw=e.target.closest('.sw'); if(sw){const lang=sw.closest('.swatches').dataset.lang; if(lang==='de')state.deC=sw.dataset.c; else state.skC=sw.dataset.c; save();applyVars();syncControls();return;}
  const tg=e.target.closest('.tg'); if(tg){const k=tg.dataset.t;state[k]=!state[k];save();applyVars();syncControls();return;}
});
/* ---- dropdown menus ---- */
function closeDrops(){document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('open'));document.querySelectorAll('.drop-btn').forEach(b=>b.classList.remove('on'));}
document.addEventListener('click',function(e){
  const t=e.target.closest('.drop-btn');
  if(t){const panel=document.getElementById(t.dataset.target),willOpen=!panel.classList.contains('open');
    closeDrops(); if(willOpen){panel.classList.add('open');t.classList.add('on');} return;}
  if(e.target.closest('.dropdown')) return;
  closeDrops();
});
/* ---- German word dictionary popup ---- */
function openMenu(w,x,y){
  closeDrops();
  const e=LEX[w.dataset.id]||{};
  const surface=w.textContent, lemma=e.l||surface, enc=encodeURIComponent(lemma);
  const inf=INFO[e.c]||['','other'], posLabel=inf[0], type=inf[1];
  const links=[];
  if(type==='verb')links.push(['Časovanie (Verbformen.de)','https://www.verbformen.de/?w='+enc]);
  links.push(['Význam (Glosbe DE→SK)','https://glosbe.com/de/sk/'+enc]);
  links.push(['Wiktionary (DE)','https://de.wiktionary.org/wiki/'+enc]);
  links.push(['DWDS','https://www.dwds.de/wb/'+enc]);
  const linksHtml=links.map(l=>'<a class="dlink" href="'+l[1]+'" target="_blank" rel="noopener">'+esc(l[0])+'</a>').join('');
  let tableHtml='';
  if(e.d){const t=e.d,c=v=>esc(v||'—');
    tableHtml='<table class="dtab"><tr><th></th><th>Jednotné</th><th>Množné</th></tr>'+
      '<tr><th>Nom.</th><td>'+c(t.nom_sg)+'</td><td>'+c(t.nom_pl)+'</td></tr>'+
      '<tr><th>Gen.</th><td>'+c(t.gen_sg)+'</td><td>'+c(t.gen_pl)+'</td></tr>'+
      '<tr><th>Dat.</th><td>'+c(t.dat_sg)+'</td><td>'+c(t.dat_pl)+'</td></tr>'+
      '<tr><th>Ak.</th><td>'+c(t.akk_sg)+'</td><td>'+c(t.akk_pl)+'</td></tr></table>';
  }else if(type==='verb'){tableHtml='<p class="dnote">Úplné časovanie otvoríš odkazom „Časovanie".</p>';}
  else if(type==='noun'){tableHtml='<p class="dnote">Skloňovanie nájdeš cez Wiktionary.</p>';}
  const lemmaLine=(e.l&&e.l!==surface)?' · základný tvar: <b>'+esc(e.l)+'</b>':'';
  const posLine=posLabel?'<p class="dpos"><b>'+esc(posLabel)+'</b>'+lemmaLine+'</p>':'';
  const sk=(e.s!==undefined)?SEGS[e.s]:'';
  const skLine=sk?'<p class="dsk"><b>Preklad úseku:</b> '+esc(sk)+'</p>':'';
  menu.innerHTML='<p class="mtitle">Slovník — „<span class="mword">'+esc(surface)+'</span>"</p>'+posLine+tableHtml+skLine+'<div class="dlinks">'+linksHtml+'</div><div class="mclose"><button id="menuClose">Zavrieť</button></div>';
  menu.hidden=false;
  const mw=menu.offsetWidth,mh=menu.offsetHeight;
  const vw=document.documentElement.clientWidth,vh=document.documentElement.clientHeight;
  let px=x,py=y+10; const maxX=window.scrollX+vw-mw-8;
  if(px>maxX)px=maxX; if(px<8)px=8;
  if(y+10+mh>window.scrollY+vh-8)py=y-mh-10; if(py<window.scrollY+8)py=window.scrollY+8;
  menu.style.left=px+'px'; menu.style.top=py+'px';
  document.getElementById('menuClose').onclick=closeMenu;
}
function closeMenu(){menu.hidden=true;}
content.addEventListener('click',e=>{const w=e.target.closest('.w'); if(w){e.stopPropagation(); openMenu(w,e.pageX,e.pageY);}});
document.addEventListener('click',e=>{if(!menu.hidden && !menu.contains(e.target)) closeMenu();});
/* ---- init ---- */
$('#doctitle').textContent = DOC.title ? (DOC.title.de+' · '+DOC.title.sk) : 'Motto';
buildSwatches();applyVars();applyNonum();renderContent();syncControls();


</script>
</body>
