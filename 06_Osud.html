const SEP='<span class="sep"> — </span>';

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function runs(rs){return rs.map(r=>{if(r.br)return '<br>';let t=esc(r.t);
  if(r.id!==undefined)t='<span class="w" data-id="'+r.id+'">'+t+'</span>';
  if(r.i)t='<em>'+t+'</em>';
  if(r.s)t='<span class="sm">'+t+'</span>';
  return t;}).join('');}
function deS(p){return '<span class="de">'+runs(p.de)+'</span>';}
function skS(p){return '<span class="sk">'+runs(p.sk)+'</span>';}

function segList(pairs,mode){
  const o=[];
  if(mode==='de') pairs.forEach(p=>o.push(deS(p)));
  else if(mode==='sk') pairs.forEach(p=>o.push(skS(p)));
  else if(mode==='skde') pairs.forEach(p=>{o.push(skS(p));o.push(deS(p));});
  else pairs.forEach(p=>{o.push(deS(p));o.push(skS(p));});
  return o;
}
function joinSegs(segs,mode){return (mode==='de'||mode==='sk')?segs.join(' '):segs.join(SEP);}
function deText(p){return p.de.map(r=>r.t).join('');}
function endsSentence(p){return /[.!?]$/.test(deText(p).trim());}
function mergePairs(pairs){
  const de=[],sk=[];
  function app(arr,rs){
    if(arr.length){const prev=arr[arr.length-1].t,nxt=rs.length?rs[0].t:'';
      if(prev&&nxt&&!/\s$/.test(prev)&&!/^\s/.test(nxt))arr.push({t:' '});}
    rs.forEach(r=>arr.push(r));
  }
  pairs.forEach(p=>{app(de,p.de);app(sk,p.sk);});
  return {de,sk};
}
function groupBySentence(pairs){
  const groups=[];let cur=[];
  pairs.forEach(p=>{cur.push(p);if(endsSentence(p)){groups.push(cur);cur=[];}});
  if(cur.length)groups.push(cur);
  return groups.map(mergePairs);
}
function regroup(pairs,gran){
  if(gran==='paragraph')return [mergePairs(pairs)];
  if(gran==='sentence')return groupBySentence(pairs);
  return pairs;
}
function para(pairs,i,numbered,mode){
  const units=(mode==='de'||mode==='sk')?pairs:regroup(pairs,state.gran);
  const num=numbered?'<sup class="pnum">'+(i+1)+'</sup>':'';
  return '<p class="para">'+num+joinSegs(segList(units,mode),mode)+'</p>';
}
function motto(pairs,mode){
  const nl=s=>s.replace(/\n/g,'<br>');
  const de='<p class="motto-de">'+nl(pairs.map(p=>runs(p.de)).join(' '))+'</p>';
  const sk='<p class="motto-sk">'+nl(pairs.map(p=>runs(p.sk)).join(' '))+'</p>';
  let inner;
  if(mode==='de')inner=de; else if(mode==='sk')inner=sk;
  else if(mode==='skde')inner=sk+de; else inner=de+sk;
  return '<div class="mottobox">'+inner+'</div>';
}
function titleHTML(doc,mode){
  if(!doc.title) return '';
  const d='<div class="title tde">'+esc(doc.title.de)+'</div>';
  const s='<div class="title tsk">'+esc(doc.title.sk)+'</div>';
  if(mode==='de') return d;
  if(mode==='sk') return s;
  if(mode==='skde') return s+d;
  return d+s;
}
function sigHTML(doc,mode){
  if(!doc.signature) return '';

function renderContent(){
  let h=titleHTML(DOC,state.mode);
  DOC.paragraphs.forEach((pairs,i)=>{h+=(DOC.id==='motto')?motto(pairs,state.mode):para(pairs,i,DOC.numbered,state.mode);});
  h+=sigHTML(DOC,state.mode);
  content.innerHTML=h;
}
function applyVars(){
  const r=document.documentElement.style;
  r.setProperty('--de-c',state.deC);r.setProperty('--sk-c',state.skC);
  r.setProperty('--de-w',state.deB?'700':'400');r.setProperty('--sk-w',state.skB?'700':'400');
  r.setProperty('--de-d',state.deU?'underline':'none');r.setProperty('--sk-d',state.skU?'underline':'none');
}
function applyNonum(){document.body.classList.toggle('nonum',!!state.nonum);}
function syncControls(){
  document.querySelectorAll('.modes button').forEach(b=>b.classList.toggle('on',b.dataset.mode===state.mode));
  document.querySelectorAll('.grans button').forEach(b=>b.classList.toggle('on',b.dataset.gran===state.gran));
  var grow=document.querySelector('.grow'); if(grow) grow.classList.toggle('off', state.mode==='de'||state.mode==='sk');
  document.querySelectorAll('.swatches').forEach(sw=>{
    const cur=(sw.dataset.lang==='de'?state.deC:state.skC).toLowerCase();
    sw.querySelectorAll('.sw').forEach(x=>x.classList.toggle('on',x.dataset.c.toLowerCase()===cur));
  });
  const map={deB:state.deB,deU:state.deU,skB:state.skB,skU:state.skU};
  document.querySelectorAll('.tg').forEach(b=>b.classList.toggle('on',map[b.dataset.t]));
  var nt=document.querySelector('[data-numtoggle]'); if(nt) nt.classList.toggle('on',!state.nonum);
}
function buildSwatches(){
  document.querySelectorAll('.swatches').forEach(sw=>{
    sw.innerHTML=PRESETS.map(p=>'<button class="sw" data-c="'+p.c+'" title="'+p.n+'" style="background:'+p.c+'"></button>').join('');
  });
}
document.addEventListener('click',e=>{
  const nt=e.target.closest('[data-numtoggle]'); if(nt){state.nonum=!state.nonum;save();applyNonum();syncControls();return;}
  const m=e.target.closest('.modes button'); if(m){state.mode=m.dataset.mode;save();renderContent();syncControls();return;}
  const gr=e.target.closest('.grans button'); if(gr){state.gran=gr.dataset.gran;save();renderContent();syncControls();return;}
  const sw=e.target.closest('.sw'); if(sw){const lang=sw.closest('.swatches').dataset.lang; if(lang==='de')state.deC=sw.dataset.c; else state.skC=sw.dataset.c; save();applyVars();syncControls();return;}
  const tg=e.target.closest('.tg'); if(tg){const k=tg.dataset.t;state[k]=!state[k];save();applyVars();syncControls();return;}
});
/* ---- dropdown menus ---- */
function closeDrops(){document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('open'));document.querySelectorAll('.drop-btn').forEach(b=>b.classList.remove('on'));}
document.addEventListener('click',function(e){
  const t=e.target.closest('.drop-btn');
  if(t){const panel=document.getElementById(t.dataset.target),willOpen=!panel.classList.contains('open');
    closeDrops(); if(willOpen){panel.classList.add('open');t.classList.add('on');} return;}
  if(e.target.closest('.dropdown')) return;
  closeDrops();
});
/* ---- German word dictionary popup ---- */
function openMenu(w,x,y){
  closeDrops();
  const e=LEX[w.dataset.id]||{};
  const surface=w.textContent, lemma=e.l||surface, enc=encodeURIComponent(lemma);
  const inf=INFO[e.c]||['','other'], posLabel=inf[0], type=inf[1];
  const links=[];
  if(type==='verb')links.push(['Časovanie (Verbformen.de)','https://www.verbformen.de/?w='+enc]);
  links.push(['Lingea DE→SK','https://slovniky.lingea.sk/nemecko-slovensky/'+enc]);
  links.push(['Význam (Glosbe DE→SK)','https://glosbe.com/de/sk/'+enc]);
  links.push(['Wiktionary (DE)','https://de.wiktionary.org/wiki/'+enc]);
  links.push(['DWDS','https://www.dwds.de/wb/'+enc]);
  const linksHtml=links.map(l=>'<a class="dlink" href="'+l[1]+'" target="_blank" rel="noopener">'+esc(l[0])+'</a>').join('');
  let tableHtml='';
  if(e.d){const t=e.d,c=v=>esc(v||'—');
    tableHtml='<table class="dtab"><tr><th></th><th>Jednotné</th><th>Množné</th></tr>'+
      '<tr><th>Nom.</th><td>'+c(t.nom_sg)+'</td><td>'+c(t.nom_pl)+'</td></tr>'+
      '<tr><th>Gen.</th><td>'+c(t.gen_sg)+'</td><td>'+c(t.gen_pl)+'</td></tr>'+
      '<tr><th>Dat.</th><td>'+c(t.dat_sg)+'</td><td>'+c(t.dat_pl)+'</td></tr>'+
      '<tr><th>Ak.</th><td>'+c(t.akk_sg)+'</td><td>'+c(t.akk_pl)+'</td></tr></table>';
  }else if(type==='verb'){tableHtml='<p class="dnote">Úplné časovanie otvoríš odkazom „Časovanie".</p>';}
  else if(type==='noun'){tableHtml='<p class="dnote">Skloňovanie nájdeš cez Wiktionary.</p>';}
  const lemmaLine=(e.l&&e.l!==surface)?' · základný tvar: <b>'+esc(e.l)+'</b>':'';
  const posLine=posLabel?'<p class="dpos"><b>'+esc(posLabel)+'</b>'+lemmaLine+'</p>':'';
  const sk=(e.s!==undefined)?SEGS[e.s]:'';
  const skLine=sk?'<p class="dsk"><b>Preklad úseku:</b> '+esc(sk)+'</p>':'';
  menu.innerHTML='<p class="mtitle">Slovník — „<span class="mword">'+esc(surface)+'</span>"</p>'+posLine+tableHtml+skLine+'<div class="dlinks">'+linksHtml+'</div><div class="mclose"><button id="menuClose">Zavrieť</button></div>';
  menu.hidden=false;
  const mw=menu.offsetWidth,mh=menu.offsetHeight;
  const vw=document.documentElement.clientWidth,vh=document.documentElement.clientHeight;
  let px=x,py=y+10; const maxX=window.scrollX+vw-mw-8;
  if(px>maxX)px=maxX; if(px<8)px=8;
  if(y+10+mh>window.scrollY+vh-8)py=y-mh-10; if(py<window.scrollY+8)py=window.scrollY+8;
  menu.style.left=px+'px'; menu.style.top=py+'px';
  document.getElementById('menuClose').onclick=closeMenu;
}
function closeMenu(){menu.hidden=true;}
content.addEventListener('click',e=>{const w=e.target.closest('.w'); if(w){e.stopPropagation(); openMenu(w,e.pageX,e.pageY);}});
document.addEventListener('click',e=>{if(!menu.hidden && !menu.contains(e.target)) closeMenu();});
/* ---- init ---- */
$('#doctitle').textContent = DOC.title ? (DOC.title.de+' · '+DOC.title.sk) : 'Motto';
buildSwatches();applyVars();applyNonum();renderContent();syncControls();


</script>
</body>
</html>
